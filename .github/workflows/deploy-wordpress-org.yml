name: Deploy to WordPress.org

# INACTIVE until the plugin is accepted on wordpress.org (no assigned SVN slug
# and no configured secrets). The primary trigger is publishing a GitHub Release
# (not merely pushing a tag, to avoid accidental runs without SVN credentials).
# A manual workflow_dispatch trigger is also available as a fallback in case the
# `release: published` event does not fire (observed to be unreliable for releases
# created as drafts and published later, with distant `created_at` and
# `published_at` timestamps).
# Once accepted on wordpress.org:
#   1. add the SVN_USERNAME / SVN_PASSWORD repository secrets
#      (Settings → Secrets and variables → Actions);
#   2. publish a GitHub Release for the version tag (for example v0.18.0):
#      the job synchronizes svn/trunk and creates svn/tags/<version>;
#      if it does not start automatically, run it manually from Actions →
#      "Deploy to WordPress.org" → "Run workflow" using the same tag.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy (for example v0.18.0) — required only for manual runs'
        required: true
        type: string

jobs:
  deploy:
    name: Deploy to SVN
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer

      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader --working-dir=system-markdown-alternate

      - name: Stage clean build directory
        # The action's BUILD_DIR ignores .distignore, so stage it explicitly
        # with the same exclusions as system-markdown-alternate/.distignore.
        run: |
          mkdir -p build/system-markdown-alternate
          rsync -a system-markdown-alternate/ build/system-markdown-alternate/ \
            --exclude=tests \
            --exclude=.distignore \
            --exclude=composer.lock

      - name: Resolve plugin version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_TAG="${{ inputs.tag }}"
          else
            RAW_TAG="${GITHUB_REF_NAME}"
          fi
          echo "value=${RAW_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: WordPress Plugin Deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: system-markdown-alternate
          VERSION: ${{ steps.version.outputs.value }}
          BUILD_DIR: build/system-markdown-alternate
          ASSETS_DIR: .wordpress-org
